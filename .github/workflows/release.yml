name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'lib/ruby_lsp/rbs/inline/version.rb'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: ruby
          # Skip bundler cache to avoid the cache-poisoning attack at release time:
          # a poisoned cache written from a PR could otherwise be reused here
          # and end up shipped to RubyGems.
          # See https://docs.zizmor.sh/audits/#cache-poisoning
          bundler-cache: false
      - name: Install dependencies
        run: bundle install
      - name: Publish to RubyGems
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
